<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="/styles/main.css" />
</head>
<body class="persona-page">

  <header class="site-header">
    <nav class="nav-container">
      <a href="/" class="logo">
        <img src="/images/logo.svg" alt="Your SaaS Product" width="120" />
      </a>
      <ul class="nav-links">
        <li><a href="/features">Features</a></li>
        <li><a href="/pricing">Pricing</a></li>
        <li><a href="/signup" class="btn-nav">Try Free</a></li>
      </ul>
    </nav>
  </header>

  <div class="breadcrumb-bar">
    <div class="container">{{{breadcrumbs}}}</div>
  </div>

  <section class="hero hero-persona" data-section="hero">
    <div class="hero-inner container">
      <h1 class="hero-title">{{h1}}</h1>
      <p class="hero-sub">{{hero_subtext}}</p>
      <a href="/signup" class="btn-primary btn-large">{{cta_text}}</a>
      <p class="hero-proof">{{social_proof_stat}}</p>
    </div>
  </section>

  <section class="content-section" data-section="content">
    <div class="container content-body">
      {{{body_content}}}
    </div>
  </section>

  <section class="faq-section" data-section="faq">
    <div class="container">
      <h2>Questions from {{h1}}</h2>
      {{{faq_block}}}
    </div>
  </section>

  <section class="related-section">
    <div class="container">
      {{{internal_links}}}
    </div>
  </section>

  <section class="cta-banner">
    <div class="container">
      <h2>Built for your hiring workflow</h2>
      <a href="/signup" class="btn-primary">{{cta_text}}</a>
    </div>
  </section>

  <footer class="site-footer">
    <div class="footer-bottom container">
      <p>&copy; 2025 Your Company.</p>
    </div>
  </footer>

</body>
</html>
